<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Autofacturación Profesional | AAM Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <style>
    .glass-effect {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
    }

    input:focus,
    select:focus {
      border-color: #2563eb !important;
      background: white !important;
    }
  </style>
</head>

<body class="bg-slate-50 font-sans min-h-screen pb-12">

  <header class="bg-white border-b border-slate-200 px-[9%] py-4 flex justify-between items-center sticky top-0 z-50">
    <div class="flex items-center gap-4">
      <a href="/index.html#portfolio"
        class="flex items-center gap-1 text-slate-400 hover:text-blue-600 transition-colors group">
        <i class='bx bx-left-arrow-alt text-2xl'></i>
        <span class="text-[10px] font-bold uppercase tracking-widest hidden md:inline">Volver</span>
      </a>

      <div class="h-6 w-[1px] bg-slate-200 mx-2"></div>

      <div class="flex items-center gap-2">
        <div class="bg-blue-600 p-2 rounded-lg text-white">
          <i class='bx bxs-calculator text-xl'></i>
        </div>
        <h1 class="text-xl font-bold text-slate-800 tracking-tight">Portal <span class="text-blue-600">AutoFactura
            4.0</span></h1>
      </div>
    </div>

    <span
      class="text-[10px] font-bold text-slate-400 border border-slate-200 px-3 py-1 rounded-full uppercase tracking-widest">
      Demo Modo Pruebas
    </span>
  </header>

  <main class="max-w-2xl mx-auto p-6 mt-8">
    <div class="bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200 border border-slate-100 overflow-hidden">

      <div class="bg-slate-50/50 p-6 border-b border-slate-100 flex justify-around">
        <div id="step-1-label" class="flex flex-col items-center gap-2 transition-all text-blue-600">
          <div
            class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold shadow-lg shadow-blue-100">
            1</div>
          <span class="text-[10px] font-black uppercase">Ticket</span>
        </div>
        <div id="step-2-label" class="flex flex-col items-center gap-2 transition-all text-slate-300">
          <div class="w-10 h-10 rounded-full bg-slate-200 text-white flex items-center justify-center font-bold">2</div>
          <span class="text-[10px] font-black uppercase">Fiscales</span>
        </div>
        <div id="step-3-label" class="flex flex-col items-center gap-2 transition-all text-slate-300">
          <div class="w-10 h-10 rounded-full bg-slate-200 text-white flex items-center justify-center font-bold">3</div>
          <span class="text-[10px] font-black uppercase">Finalizar</span>
        </div>
      </div>

      <div class="p-8 md:p-12">
        <div id="step-1" class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-500 ml-2">Folio de Venta</label>
              <input type="text" id="folio" placeholder="Eje: A-9980"
                class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl outline-none transition-all">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-500 ml-2">Fecha del Ticket</label>
              <input type="date" id="fecha"
                class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl outline-none transition-all">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-500 ml-2">Sucursal</label>
              <select id="sucursal"
                class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl outline-none transition-all">
                <option value="Zapopan Centro">Zapopan Centro</option>
                <option value="Cancún Marina">Cancún Marina</option>
                <option value="CDMX Reforma">CDMX Reforma</option>
              </select>
            </div>
            <div class="space-y-2">
              <label class="text-xs font-bold text-slate-500 ml-2">Monto Total</label>
              <input type="number" id="monto" placeholder="0.00"
                class="w-full p-4 bg-slate-50 border border-transparent rounded-2xl outline-none transition-all font-bold text-blue-600">
            </div>
          </div>
          <button onclick="goToStep(2)"
            class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-100 hover:scale-[1.02] transition-all uppercase tracking-widest text-sm">Validar
            Ticket</button>
        </div>

        <div id="step-2" class="space-y-6 hidden">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input type="text" id="rfc" placeholder="RFC"
              class="p-4 bg-slate-50 border border-transparent rounded-2xl uppercase">
            <input type="text" id="razon" placeholder="Razón Social"
              class="p-4 bg-slate-50 border border-transparent rounded-2xl">
            <input type="email" id="correo" placeholder="Correo Electrónico"
              class="p-4 bg-slate-50 border border-transparent rounded-2xl md:col-span-2">
            <select id="uso-cfdi" class="p-4 bg-slate-50 border border-transparent rounded-2xl text-sm">
              <option value="">Uso de CFDI...</option>
              <option value="G03">G03 Gastos en general</option>
              <option value="S01">S01 Sin efectos fiscales</option>
            </select>
            <select id="forma-pago" class="p-4 bg-slate-50 border border-transparent rounded-2xl text-sm">
              <option value="">Forma de Pago...</option>
              <option value="01">01 Efectivo</option>
              <option value="03">03 Transferencia</option>
              <option value="04">04 Tarjeta de Crédito</option>
            </select>
            <select id="metodo-pago"
              class="p-4 bg-slate-50 border border-transparent rounded-2xl text-sm md:col-span-2">
              <option value="PUE">PUE Pago en una sola exhibición</option>
              <option value="PPD">PPD Pago en parcialidades o diferido</option>
            </select>
          </div>
          <div class="flex gap-4 pt-4">
            <button onclick="goToStep(1)" class="flex-1 py-4 font-bold text-slate-400">Atrás</button>
            <button onclick="goToStep(3)"
              class="flex-[2] bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">Confirmar Datos</button>
          </div>
        </div>

        <div id="step-3" class="hidden space-y-8 animate-in fade-in zoom-in duration-300">
          <div class="bg-green-50 border border-green-100 p-6 rounded-[2rem] text-center">
            <div
              class="w-16 h-16 bg-green-500 text-white rounded-full flex items-center justify-center mx-auto mb-4 text-3xl shadow-lg shadow-green-100">
              <i class='bx bx-check'></i>
            </div>
            <h2 class="text-2xl font-black text-slate-800">¡Factura Generada!</h2>
            <p class="text-green-700 text-sm font-medium">El CFDI 4.0 ha sido timbrado exitosamente.</p>
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <button onclick="window.alert('Descargando XML...')"
              class="flex items-center justify-center gap-3 p-5 bg-slate-800 text-white rounded-2xl font-bold hover:bg-slate-900 transition-all">
              <i class='bx bx-code-alt text-2xl text-blue-400'></i> XML
            </button>
            <button onclick="window.alert('Generando PDF...')"
              class="flex items-center justify-center gap-3 p-5 bg-red-600 text-white rounded-2xl font-bold hover:bg-red-700 transition-all">
              <i class='bx bxs-file-pdf text-2xl'></i> PDF
            </button>
            <button onclick="toggleEmailSection()"
              class="md:col-span-2 flex items-center justify-center gap-3 p-5 border-2 border-slate-200 text-slate-600 rounded-2xl font-bold hover:bg-slate-50 transition-all">
              <i class='bx bx-envelope text-2xl'></i> Enviar a otro correo
            </button>
          </div>

          <div id="email-section" class="hidden p-6 bg-blue-50 rounded-3xl border border-blue-100 space-y-4">
            <h4 class="text-xs font-black text-blue-800 uppercase tracking-widest text-center">Reenviar Comprobantes
            </h4>
            <div class="flex gap-2">
              <input type="email" id="new-email" placeholder="nuevo@correo.com"
                class="flex-1 p-4 rounded-xl border-none outline-none text-sm">
              <button onclick="window.alert('¡Enviado!'); toggleEmailSection()"
                class="bg-blue-600 text-white px-6 rounded-xl font-bold">Enviar</button>
            </div>
          </div>

          <div class="text-center pt-6 border-t border-slate-100">
            <button onclick="location.reload()" class="text-blue-600 font-bold text-sm hover:underline">Facturar otro
              ticket</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="text-center text-slate-300 text-[10px] font-bold uppercase tracking-widest mt-8">
    &copy; 2026 AAM Design Solutions Web | Sistema de Gestión Fiscal
  </footer>

  <script>
    function goToStep(stepNumber) {
      document.querySelectorAll('[id^="step-"]').forEach(el => {
        if (!el.id.includes('label')) el.classList.add('hidden');
      });

      for (let i = 1; i <= 3; i++) {
        const label = document.getElementById(`step-${i}-label`);
        if (i <= stepNumber) {
          label.classList.remove('text-slate-300');
          label.classList.add('text-blue-600');
          label.querySelector('div').classList.replace('bg-slate-200', 'bg-blue-600');
        } else {
          label.classList.add('text-slate-300');
          label.classList.remove('text-blue-600');
          label.querySelector('div').classList.replace('bg-blue-600', 'bg-slate-200');
        }
      }

      document.getElementById('step-' + stepNumber).classList.remove('hidden');
    }

    function toggleEmailSection() {
      const section = document.getElementById('email-section');
      section.classList.toggle('hidden');
    }
  </script>
</body>

</html>
