<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demos Gastronómicas | AAM Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
</head>

<body class="bg-slate-900 text-white font-sans min-h-screen flex items-center justify-center p-6">
  <div class="max-w-4xl w-full text-center">
    <h1 class="text-4xl font-black mb-4 tracking-tighter">SOLUCIONES <span class="text-cyan-400">HOSTELERÍA</span></h1>
    <p class="text-slate-400 mb-12">Selecciona el concepto que deseas explorar para tu negocio.</p>

    <div class="grid md:grid-cols-2 gap-8">
      <a href="demo-bar.html"
        class="group relative overflow-hidden rounded-[2.5rem] bg-slate-800 p-1 transition-all hover:scale-105">
        <div
          class="bg-slate-900 rounded-[2.3rem] p-8 h-full flex flex-col items-center justify-center border border-slate-700 group-hover:border-cyan-500/50 transition-colors">
          <i class='bx bx-drink text-6xl text-cyan-400 mb-4'></i>
          <h2 class="text-2xl font-bold">Concepto Bar</h2>
          <p class="text-sm text-slate-500 mt-2">Dark mode, elegancia y vida nocturna.</p>
        </div>
      </a>

      <a href="demo-cafe.html"
        class="group relative overflow-hidden rounded-[2.5rem] bg-orange-100 p-1 transition-all hover:scale-105">
        <div
          class="bg-white rounded-[2.3rem] p-8 h-full flex flex-col items-center justify-center border border-orange-200 group-hover:border-orange-500/50 transition-colors text-slate-800">
          <i class='bx bx-coffee-togo text-6xl text-orange-500 mb-4'></i>
          <h2 class="text-2xl font-bold">Concepto Cafetería</h2>
          <p class="text-sm text-slate-400 mt-2">Cálido, minimalista y artesanal.</p>
        </div>
      </a>
    </div>
  </div>
</body>

</html>
